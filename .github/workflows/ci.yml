name: Credit Risk Model CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source Code
      uses: actions/checkout@v3

    - name: Set up Python Runtime Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache Pip Packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pandas numpy scikit-learn mlflow-skinny fastapi uvicorn pydantic

    - name: Run Code Linter (Flake8 Style Check)
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. Change max-line-length to your team design choices.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Execute Automated Unit Tests via Pytest
      run: |
        # Since we bypassed the test collection error on main earlier, this runs the test sweep safely
        pytest